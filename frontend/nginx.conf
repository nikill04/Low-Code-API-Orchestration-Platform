server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-page app: any unknown path falls back to index.html
  location / {
    try_files $uri /index.html;
  }

  # Inside docker-compose the backend is reachable at http://backend:4000
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
  }

  location /mock/ {
    proxy_pass http://backend:4000/mock/;
    proxy_set_header Host $host;
  }
}
