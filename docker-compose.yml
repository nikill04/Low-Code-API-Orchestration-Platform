version: "3.9"

services:
  backend:
    build: ./backend
    container_name: orchestrator-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - JWT_SECRET=change-this-secret-in-production
      - DEFAULT_ADMIN_EMAIL=admin@orchestrator.dev
      - DEFAULT_ADMIN_PASSWORD=Admin@123
      - MOCK_VENDOR_FAILURE_RATE=0.15
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: orchestrator-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  backend-data:
